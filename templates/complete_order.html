{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><h5>✅ 完了報告 - {{ order.management_no }}</h5></div>
      <div class="card-body">
        <p><strong>依頼元：</strong>{{ order.client.name }}</p>
        <p><strong>ユーザー名：</strong>{{ order.user_name or '-' }}</p>
        <p><strong>作業場所：</strong>{{ order.work_place or '-' }}</p>
        <p><strong>作業内容：</strong>{{ order.work_content or '-' }}</p>
        <hr>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">作業員名</label>
            <select name="worker_name" class="form-select" required>
              <option value="">選択してください</option>
              <option value="山元">山元</option>
              <option value="山根">山根</option>
              <option value="岩橋">岩橋</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">完了日</label>
            <input type="date" name="completed_date" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100">完了報告を保存</button>
        </form>
        <a href="/" class="btn btn-secondary w-100 mt-2">戻る</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
