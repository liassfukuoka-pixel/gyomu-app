<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>業務管理アプリ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">業務管理</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/">ホーム</a>
      <a class="nav-link" href="/clients">依頼元管理</a>
      <a class="nav-link" href="/search">検索</a>
      <a class="nav-link" href="/export/all">全件出力</a>
    </div>
    <form method="POST" action="/fetch_mail" class="d-flex">
      <button type="submit" class="btn btn-success btn-sm">📧 メールを取込む</button>
    </form>
  </div>
</nav>
<div class="container-fluid mt-4">
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}
{% block content %}{% endblock %}
</div>
</body>
</html>
